name: Tests

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
  pull_request:
    branches-ignore: []
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:
        python: [3.9, '3.10', '3.11']
      fail-fast: false

    steps:

    - name: checkout git repo
      uses: actions/checkout@v4

    - name: conda/mamba
      uses: mamba-org/setup-micromamba@v1
      with:
          environment-file: environment.yml
          create-args: >-
            python=${{ matrix.python }}

    - name: install package itself
      shell: bash -l {0}
      run: |
        pip install .

    - name: Install dependencies
      shell: bash -l {0}
      run: |
        pip install coveralls pytest-cov pytest pytest-xdist

    - name: testing
      shell: bash -l {0}
      run: |
        pytest -v --cov-report term-missing --cov=sequana_pipelines.demultiplex

    - name: coveralls
      shell: bash -l {0}
      run: |
        coveralls --service=github
      env:
          GITHUB_TOKEN: ${{ github.token }}
